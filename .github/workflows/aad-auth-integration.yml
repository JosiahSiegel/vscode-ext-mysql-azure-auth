# Azure MySQL AAD auth integration test
#
# Runs the hermetic test suite for the Entra MySQL auth path. The
# suite exercises `EntraTokenProvider`, `DatabaseSession`, the SQL
# classifier, and `swapToken` rotation against a fake `mysql2/promise`
# pool that validates JWTs against a test-owned RSA public key.
#
# This is NOT a MySQL wire-protocol test — that is mysql2's job. The
# fake pool tests what this extension actually owns: the auth + query
# dispatch path. A real `mysqld` would be a different test.
#
# Required check: any PR that changes `src/identity/**`,
# `src/registry/**`, or `test/integration/**` cannot merge until this
# workflow is green. To enforce, add "Azure MySQL AAD Auth Integration
# / test (ubuntu-latest)" as a required status check under
# Settings -> Branches -> Branch protection rules -> main.

name: Azure MySQL AAD Auth Integration

on:
  push:
    branches: [main]
    paths:
      - 'src/identity/**'
      - 'src/registry/**'
      - 'test/integration/**'
      - '.github/workflows/stub-integration.yml'
  pull_request:
    paths:
      - 'src/identity/**'
      - 'src/registry/**'
      - 'test/integration/**'
      - '.github/workflows/stub-integration.yml'
  workflow_dispatch:

concurrency:
  group: stub-integration-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Node
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build stub test
        run: npm run build:stub

      - name: Run stub integration tests
        run: npm run test:stub

      - name: Upload test log on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.0
        with:
          name: stub-test-log-${{ matrix.os }}
          path: |
            out/test/integration/**/*.log
          if-no-files-found: ignore
