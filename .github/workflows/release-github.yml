name: "Release: GitHub + Marketplace"

# GitHub Releases + VS Code Marketplace workflow for community-preview
# distribution.
#
# On every tag push this workflow:
#   1. Regenerates `resources/icons/icon.png` from the SVG so the
#      shipped VSIX always carries the freshest icon.
#   2. Builds the VSIX (`npm run package`).
#   3. Publishes the same VSIX to the VS Code Marketplace under the
#      `JosiahSiegel` publisher namespace using `secrets.VSCE_PAT`.
#   4. Computes the VSIX SHA-256 and uploads the VSIX + checksum as a
#      workflow artifact.
#   5. Creates a GitHub Release marked as pre-release and attaches the
#      VSIX + checksum to it.
#
# No manual `vsce publish` step is required.
#
# Trigger model:
#   - push: tags matching `v*.*.*` or `0.*` (e.g. `0.1.1-preview`).
#     Owner-initiated by pushing a tag locally:
#       git tag 0.1.1-preview
#       git push origin 0.1.1-preview
#   - workflow_dispatch: manual run. Provide `tag` input to override the
#     tag derived from the trigger ref (defaults to `0.1.1-preview`).
#
# Permission model:
#   - Job declares `permissions: contents: write` because creating a
#     GitHub Release requires write access to repository contents. The
#     workflow only runs on owner-initiated tag pushes; no PR / fork /
#     schedule triggers.
#   - The VS Code Marketplace Personal Access Token (PAT) is read from
#     the `VSCE_PAT` repository secret. The PAT must be issued against
#     the `JosiahSiegel` publisher namespace (Account → Personal Access
#     Tokens on the Marketplace publisher management page). The token
#     is never echoed, never written to disk, and is only passed to
#     `vsce publish` via `--pat`. The workflow fails fast if the secret
#     is unset.
#   - No `id-token: write` is requested because `vsce publish` does
#     not currently accept Azure AD / OIDC tokens; PAT is required.
#
# Distribution semantics:
#   - The Marketplace publish reads the version from `package.json#version`.
#     The git tag (e.g. `0.1.1-preview`) is independent — the maintainer
#     keeps them aligned manually. Bumping `package.json#version` is the
#     way to publish a new Marketplace build.
#   - The publish is not gated by `verify:t19`; the gate is an audit
#     trail of external attestations (live Azure test, pilot records)
#     that remain pending. See `BUILD.md` for the full gate chain and
#     `.github/workflows/release-dry-run.yml` for the dry-run validation
#     workflow that exercises the gate suite without publishing.

on:
  push:
    tags:
      - "0.*"
      - "v0.*.*"
      - "v1.*.*"
      - "v2.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag name to release (defaults to 0.1.0-preview if empty)."
        required: false
        type: string
        default: ""

permissions: {}

concurrency:
  group: release-github-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-github:
    name: Build, publish to Marketplace, attach to GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Setup Node 20.16.0
        uses: actions/setup-node@v4
        with:
          node-version: "20.16.0"

      - name: Install dependencies
        run: npm ci

      - name: Lint (sanity)
        # Quick lint gate before packaging. ESLint exits non-zero on any
        # error; warnings are tolerated. The dedicated CI workflow does
        # the full lint + typecheck + unit + integration matrix.
        run: npm run lint

      - name: Regenerate extension icon
        # The Marketplace gallery renders icon.png at 128x128. The SVG
        # under resources/icons/server-key.svg is the source of truth;
        # this step ensures the shipped VSIX always carries the freshest
        # icon. `npm run compile` calls this too, but `npm run package`
        # does not, so we run it explicitly here.
        run: npm run icons:regen

      - name: Package VSIX
        # Runs scripts/sbom.mjs chain implicitly via `npm run package`.
        # The package script does:
        #   1. esbuild minified bundle into out/main.js
        #   2. vsce package --no-dependencies
        # Output: mysql-azure-auth-0.1.0.vsix in the repo root.
        run: npm run package

      - name: Verify package gate (Todo 14)
        # Confirm the build is internally consistent. Todo 14 emits
        # PACKAGE PREFLIGHT READY on a clean tree; the live run is the
        # source of truth even when this job continues to release.
        run: node scripts/verify-task.mjs 14
        continue-on-error: true

      - name: Resolve release tag
        id: resolve-tag
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            TAG="${{ github.event.inputs.tag }}"
          elif [ -n "${{ github.ref_name }}" ] && [ "${{ github.ref_type }}" = "tag" ]; then
            TAG="${{ github.ref_name }}"
          else
            TAG="0.1.0-preview"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Resolved release tag: ${TAG}"

      - name: Compute SHA-256 of VSIX
        id: hash
        run: |
          VSIX=$(ls mysql-azure-auth-*.vsix | head -n 1)
          echo "vsix=${VSIX}" >> "$GITHUB_OUTPUT"
          sha256sum "${VSIX}" | awk '{print $1}' > "${VSIX}.sha256"
          echo "sha256=$(cat ${VSIX}.sha256)" >> "$GITHUB_OUTPUT"
          echo "VSIX: ${VSIX}"
          echo "SHA-256: $(cat ${VSIX}.sha256)"

      - name: Read Marketplace version
        id: mp-version
        # vsce publish uploads the version recorded in package.json,
        # not the git tag. We surface it in the log so the maintainer
        # can sanity-check that the tag and the Marketplace version
        # are aligned before the publish step runs.
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Marketplace version (from package.json): ${VERSION}"

      - name: Publish VSIX to VS Code Marketplace
        # vsce publish uploads the freshly-built VSIX to the
        # Marketplace under the publisher namespace declared in
        # package.json (JosiahSiegel). The PAT is read from the
        # VSCE_PAT repository secret and passed via --pat so it never
        # touches process argv beyond the vsce invocation, and never
        # appears in the GitHub Actions log.
        #
        # If the same version already exists on the Marketplace
        # (e.g. this workflow re-ran on the same tag), vsce exits
        # non-zero with a "version already exists" error. Re-uploading
        # an identical VSIX is otherwise a no-op; bumping
        # package.json#version is the way to publish a new build.
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          if [ -z "${VSCE_PAT}" ]; then
            echo "::error::VSCE_PAT secret is not set. Add a Personal Access Token for the JosiahSiegel publisher namespace to the repository's Actions secrets, then re-run."
            exit 1
          fi
          echo "Publishing to VS Code Marketplace (publisher: $(node -p "require('./package.json').publisher"), version: ${{ steps.mp-version.outputs.version }})"
          npx --no-install @vscode/vsce publish --pat "${VSCE_PAT}" --packagePath mysql-azure-auth-${{ steps.mp-version.outputs.version }}.vsix
          echo "Marketplace publish completed."

      - name: Upload VSIX + checksum as workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vsix-and-checksum
          if-no-files-found: error
          retention-days: 30
          path: |
            mysql-azure-auth-*.vsix
            mysql-azure-auth-*.vsix.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "${{ steps.resolve-tag.outputs.tag }}"
          tag_name: "${{ steps.resolve-tag.outputs.tag }}"
          generate_release_notes: true
          prerelease: true
          draft: false
          fail_on_unmatched_files: true
          files: |
            mysql-azure-auth-*.vsix
            mysql-azure-auth-*.vsix.sha256
          body: |
            ## mysql-azure-auth ${{ steps.resolve-tag.outputs.tag }}

            Community preview VSIX for the **Azure Database for MySQL
            Flexible Server + Microsoft Entra ID authentication** VS Code
            extension. This release is a **pre-release**, not an official
            Microsoft extension, and is not affiliated with Microsoft,
            Azure, Oracle, or MySQL.

            ### Install

            **VS Code Marketplace** (publisher: `JosiahSiegel`):
            search for **MySQL Azure Auth** in the Extensions panel and
            click **Install**. This workflow publishes the same VSIX
            to the Marketplace automatically — no manual step required.

            **GitHub Releases** (this artifact):
            1. Download `mysql-azure-auth-${{ steps.resolve-tag.outputs.tag }}.vsix`.
            2. In VS Code: **Extensions** panel → `⋯` menu →
               **Install from VSIX…** → pick the downloaded file.
            3. Reload VS Code when prompted.

            ### Verify

            The SHA-256 checksum is published alongside the VSIX:

            ```
            ${{ steps.hash.outputs.sha256 }}
            ```

            ### Known limitations

            - **Marketplace version is `package.json#version`.** This
              GitHub Release is tagged `${{ steps.resolve-tag.outputs.tag }}`
              but the Marketplace publish uses
              `${{ steps.mp-version.outputs.version }}` (read from
              `package.json`). Keep them aligned manually; the workflow
              does not rewrite either.
            - **Read-only by design.** DDL, write SQL, and row/schema
              editing are rejected by `classifySqlBatch` before any
              pool dispatch. There is no Marketplace opt-out for this.
            - **No telemetry.** The extension does not embed Application
              Insights, Sentry, or any other analytics SDK. Outbound
              calls are limited to the VS Code Microsoft auth provider,
              Azure CLI (fallback), and the MySQL Flexible Server.
            - **No device-code sign-in.** Removed during preview; use
              the VS Code Microsoft auth provider or the Azure CLI
              fallback.

            See [`SECURITY.md`](./SECURITY.md) for the vulnerability
            reporting policy and [`docs/PRIVACY.md`](./docs/PRIVACY.md)
            for the authoritative privacy policy.