# Hermes CI: stub integration test
#
# Spins up a real MySQL wire-protocol stub on localhost and runs the
# `test:stub` integration test suite. The stub implements just enough
# of the MySQL 8.0 handshake (advertising `mysql_clear_password` as
# the default auth plugin) to validate that the extension's auth path
# (Entra JWT -> mysql2 -> wire -> server) actually works end-to-end
# without needing a real Azure MySQL Flexible Server.
#
# Required check: any PR that changes the auth path (EntraTokenProvider,
# DatabaseSession, or the stub itself) cannot merge until this workflow
# is green. To enforce, add "Hermes Stub Integration / test" as a
# required status check under Settings -> Branches.

name: Hermes Stub Integration

on:
  push:
    branches: [main]
    paths:
      - 'src/identity/**'
      - 'src/registry/**'
      - 'test/integration/**'
      - '.github/workflows/stub-integration.yml'
  pull_request:
    paths:
      - 'src/identity/**'
      - 'src/registry/**'
      - 'test/integration/**'
      - '.github/workflows/stub-integration.yml'
  workflow_dispatch:

concurrency:
  group: stub-integration-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install OpenSSL
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          # Git for Windows ships with OpenSSL; CI runners have it on PATH already.
          openssl version

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build stub test
        run: npm run build:stub

      - name: Run stub integration tests
        run: npm run test:stub

      - name: Upload test log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: stub-test-log-${{ matrix.os }}
          path: |
            out/test/integration/**/*.log
          if-no-files-found: ignore
