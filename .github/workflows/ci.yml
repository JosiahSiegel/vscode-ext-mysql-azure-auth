name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Repository-wide permissions are empty by default; each job declares
# `permissions: contents: read` (added in Todo 13) so a workflow compromise
# cannot push, edit, or read PR-side secrets. The runtime gates are
# unmodified from the Todo 1 baseline.

permissions: {}

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build, lint, and test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        node: [20.x]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Compile extension
        run: npm run compile

      - name: Run unit tests
        run: npm run test:unit

      - name: Run integration tests
        run: xvfb-run --auto-servernum npm run test:integration

      - name: Package VSIX
        run: npm run package

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: azure-mysql-entra-${{ matrix.node }}-vsix
          path: '*.vsix'
          if-no-files-found: warn